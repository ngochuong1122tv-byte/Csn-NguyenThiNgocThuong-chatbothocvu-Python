services:
  rasa:
    build: .
    container_name: rasa_server
    ports:
      - "5005:5005"
    volumes:
      - .:/app
    command: >
      run --enable-api --cors "*" --model models --debug
    depends_on:
      - action_server

  action_server:
    build: .
    container_name: rasa_action
    ports:
      - "5055:5055"
    volumes:
      - .:/app
    command: >
      run actions

  web:
    image: nginx:alpine
    container_name: web_ui
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html