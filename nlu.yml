version: "3.1"

nlu:

- intent: greet
  examples: |
    - xin chào
    - chào bạn
    - hello
    - hi
    - chào chatbot
    - alo
    - tôi muốn tư vấn học vụ
    - ê
- intent: ask_tuition_general
  examples: |
    - học phí ngành công nghệ thông tin bao nhiêu
    - cho tôi xem học phí ngành điều dưỡng
    - học phí ngành này là bao nhiêu

- intent: ask_tuition_by_credit
  examples: |
    - tính học phí theo tín chỉ
    - tôi muốn tính học phí theo số tín chỉ
    - tính tiền học theo tín chỉ

- intent: choose_major
  examples: |
    - Công nghệ thông tin
    - Kỹ thuật xây dựng
    - Điều dưỡng
    - Ngôn ngữ Anh



- intent: inform_major
  examples: |
    - ngành công nghệ thông tin
    - ngành kỹ thuật xây dựng
    - mình học ngành điều dưỡng


- intent: ask_tuition
  examples: |
    - xem học phí
    - học phí ngành
    - học phí bao nhiêu

- intent: ask_schedule
  examples: |
    - xem lịch học
