name: Chatbot CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t chatbot-rasa .

      - name: Run container
        run: docker run -d -p 5005:5005 chatbot-rasa
