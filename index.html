<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Chatbot TVU</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: #fff;
  height: 100vh;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 16px;
}
.new-chat {
  background: #617ee0;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

/* Chat */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.header {
  background: #6e89d4;
  padding: 14px;
  font-weight: bold;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.msg {
  max-width: 70%;
  margin-bottom: 12px;
  padding: 12px 16px;
  border-radius: 14px;
}
.user {
  background: #648fec;
  margin-left: auto;
}
.bot {
  background: #1f2937;
}

/* Input */
.input-area {
  display: flex;
  padding: 12px;
  border-top: 1px solid #1e293b;
}
.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}
.input-area button {
  margin-left: 10px;
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
}

/* Buttons */
.bot-buttons {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}
.bot-buttons button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🎓 Chatbot TVU</h2>
  <div class="new-chat" onclick="startChat()">➕ Chat mới</div>
</div>

<div class="chat-container">
  <div class="header">Chatbot tư vấn học vụ Trường Đại học Trà Vinh</div>

  <div id="messages" class="messages"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Nhập tin nhắn..." />
    <button onclick="sendText()">Gửi</button>
  </div>
</div>

<script>
const RASA_URL = "https://furlable-preimportantly-joetta.ngrok-free.dev/webhooks/rest/webhook";
const senderId = "tvu_user";

// Start chat
function startChat() {
  document.getElementById("messages").innerHTML = "";

  addMessage(
    "👋 Xin chào!\nBạn có thể hỏi:\n- Học phí\n- Ngành học\n- Điểm rèn luyện",
    "bot"
  );
}

// Enter để gửi
document.getElementById("userInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendText();
});

// Gửi text
function sendText() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  addMessage(text, "user");
  sendToRasa(text);
}

// Gửi tới Rasa
async function sendToRasa(message) {
  let loading;

  try {
    // Loading
    loading = addMessage("🤖 Đang trả lời...", "bot");

    const res = await fetch(RASA_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        sender: senderId,
        message: message
      })
    });

    const data = await res.json();
    console.log("Rasa response:", data);

    // Xóa loading
    loading.remove();

    // Không có response
    if (!data || data.length === 0) {
      addMessage("🤖 Xin lỗi, tôi chưa hiểu câu hỏi này.", "bot");
      return;
    }

    data.forEach(handleBotMessage);

  } catch (err) {
    console.error(err);

    if (loading) loading.remove();

    addMessage("❌ Không kết nối được server Rasa!", "bot");
  }
}

// Xử lý message bot
function handleBotMessage(msg) {
  if (msg.text) addMessage(msg.text, "bot");

  if (msg.buttons) {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";

    const box = document.createElement("div");
    box.className = "bot-buttons";

    msg.buttons.forEach(b => {
      const btn = document.createElement("button");
      btn.innerText = b.title;

      btn.onclick = () => {
        addMessage(b.title, "user");
        sendToRasa(b.payload);
      };

      box.appendChild(btn);
    });

    wrap.appendChild(box);
    document.getElementById("messages").appendChild(wrap);
  }

  scrollDown();
}

// Thêm message
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  document.getElementById("messages").appendChild(div);
  scrollDown();
  return div;
}

// Scroll
function scrollDown() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

// Focus input
document.getElementById("userInput").focus();

// Init
startChat();
</script>

</body>
</html>
